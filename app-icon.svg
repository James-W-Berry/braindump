<svg viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <clipPath id="plate-clip">
      <rect x="102" y="102" width="820" height="820" rx="180" ry="180"/>
    </clipPath>
  </defs>

  <!-- Gold-leaf plate. -->
  <rect x="102" y="102" width="820" height="820" rx="180" ry="180" fill="#c49935"/>

  <!-- Moebius sun/moon: a single pale celestial mark floating in the upper-left
       of the gold field, diagonally opposed to the teal bands. -->
  <circle cx="350" cy="340" r="110" fill="#e6e2d8"/>

  <!-- Two diagonal teal bands in the bottom-right quadrant. -->
  <g clip-path="url(#plate-clip)" stroke="#1f8ba8" stroke-width="72" fill="none">
    <line x1="480" y1="960" x2="1040" y2="400"/>
    <line x1="640" y1="960" x2="1040" y2="560"/>
  </g>
</svg>
